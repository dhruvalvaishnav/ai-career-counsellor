version: '3.8'

services:
  # ZooKeeper service using Confluent image
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"  # Default ZooKeeper client port
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - spring-network

  # Kafka service using Confluent image
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    environment:
      # Kafka listener security protocol
      KAFKA_LISTENER_SECURITY_PROTOCOL: PLAINTEXT

      # External and internal listeners with ports
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE

      # Internal listener configuration (broker-to-broker communication)
      KAFKA_LISTENER_INTERNAL: INSIDE://kafka:9093
      KAFKA_LISTENERS_INTERNAL: INSIDE://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS_INTERNAL: INSIDE://kafka:9093
      KAFKA_LISTENER_INTERNAL_PORT: 9093

      # Security protocol for the INSIDE listener
      KAFKA_LISTENER_SECURITY_PROTOCOL_INSIDE: PLAINTEXT

      # Zookeeper connection details
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Kafka Broker ID (optional, but good practice to define)
      KAFKA_BROKER_ID: 1

      # to avoid random crash
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT

    ports:
      - "9092:9092"   # external
      - "9093:9093"   # internal
    depends_on:
      - zookeeper
    networks:
      - spring-network

networks:
  spring-network:
    driver: bridge
