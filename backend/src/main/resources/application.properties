spring.application.name=aicareercounsellor-backend

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=career-counsellor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Groq AI Configuration
AI_Career_Counselling_API_Key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
# Free & powerful model — change to llama-3.1-8b-instant for faster/lighter responses
groq.model=llama-3.3-70b-versatile

# H2 In-Memory Database (Dev)
spring.datasource.url=jdbc:h2:mem:careerdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator (Health checks)
management.endpoints.web.exposure.include=health,info
